services:
  postgres:
    image: postgres:16-alpine
    container_name: livibe-admin-management
    restart: unless-stopped
    environment:
      POSTGRES_DB: livibe-admin-management
      POSTGRES_USER: livibe
      POSTGRES_PASSWORD: livibe123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livibe -d livibe-admin-management"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
